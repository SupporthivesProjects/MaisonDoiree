<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maison Doree</title>

    <!-- Bootstrap Styles Links -->
    <link rel="stylesheet" href="./assets/dist/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/main.css">

    <!-- Owl Carousel Links -->
    <link rel="stylesheet" href="./assets/dist/owl-carousel/css/owl.carousel.css">

    <!-- Style Sheets -->
    <link rel="stylesheet" href="./assets/css/m_style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">


</head>

<body>

    <header class="fixed-top">
        <div class="container nav_main">
            <div class="nav_left">

                <a class="nav_logo" href="./home.html">
                    <img src="./assets/img/nav_logo.png" alt="" class="img-fluid">
                </a>

                <button class="desktop_pad_none nav_toggler" type="button">
                    <div class="hamburger_menu">
                        <img src="./assets/img/nav_toggler.png" alt="" class="img-fluid">
                    </div>
                    <div class="hamburger_menu_close" style="display: none;">
                        <img src="./assets/img/nav_toggler_close.png" alt="" class="img-fluid">
                    </div>
                </button>
            </div>
            <div class="mobile_pad_none">

                <div class="nav_center">
                    <button class="btn btn_nav_link active" onclick="window.location.href='home.html'">HOME</button>
                    <button class="btn btn_nav_link" onclick="window.location.href='aboutus.html'">ABOUT US</button>
                    <button class="btn btn_nav_link" onclick="window.location.href='menu.html'">MENU</button>
                    <button class="btn btn_nav_link" onclick="window.location.href='gallery.html'">GALLERY</button>
                    <button class="btn btn_nav_link" onclick="window.location.href='contact.html'">CONTACT</button>
                </div>
            </div>

            <div class="mobile_pad_none">
                <button class="btn btn_nav">Reserve a Table</button>
            </div>

            <div class="desktop_pad_none nav_mobo" style="display: none;">
                <button class="btn btn_nav_link active" onclick="window.location.href='home.html'">HOME</button>
                <button class="btn btn_nav_link" onclick="window.location.href='aboutus.html'">ABOUT US</button>
                <button class="btn btn_nav_link" onclick="window.location.href='menu.html'">MENU</button>
                <button class="btn btn_nav_link" onclick="window.location.href='gallery.html'">GALLERY</button>
                <button class="btn btn_nav_link" onclick="window.location.href='contact.html'">CONTACT</button>
            </div>
        </div>

    </header>


    <footer class="footer_main">
        <div class="container">
            <div class="footer_collection">
                
                <div class="footer_top">
                    <div class="footer_left">
                        <img src="./assets/img/nav_logo.png" onclick="window.location.href='home.html'" alt="" class="img-fluid">
                        <p class="footer_left_text">
                            A sanctuary of French gastronomy in the heart of Paris. Three Michelin stars. Three decades of memory-making.
                        </p>
                        <div class="footer_social_div">
                            <button class="btn btn_social">
                                <img src="./assets/img/f.svg" alt="" class="img-fl">
                            </button>
                            <button class="btn btn_social">
                                <img src="./assets/img/in.svg" alt="" class="img-fl">
                            </button>
                            <button class="btn btn_social">
                                <img src="./assets/img/play.svg" alt="" class="img-fl">
                            </button>
                            <button class="btn btn_social">
                                <img src="./assets/img/ai.svg" alt="" class="img-fl">
                            </button>
                        </div>
                    </div>
                    <div class="footer_right">
                        <div class="footer_right_inner">
                            <p class="footer_link_title">Navigate</p>
                            <div class="footer_link_div">
                                <button class="btn footer_link" onclick="window.location.href='home.html'">Home</button>
                                <button class="btn footer_link" onclick="window.location.href='aboutus.html'">About Us</button>
                                <button class="btn footer_link" onclick="window.location.href='menu.html'">Menu</button>
                                <button class="btn footer_link" onclick="window.location.href='gallery.html'">Gallery</button>
                                <button class="btn footer_link" onclick="window.location.href='contact.html'">Contact</button>
                            </div>
                        </div>
                        <div class="footer_right_inner">
                            <p class="footer_link_title">Dining</p>
                            <div class="footer_link_div">
                                <button class="btn footer_link">À la Carte</button>
                                <button class="btn footer_link">Tasting Menu</button>
                                <button class="btn footer_link">Wine Cellar</button>
                                <button class="btn footer_link">Private Dining</button>
                                <button class="btn footer_link">Gift Vouchers</button>
                            </div>
                        </div>
                        <div class="footer_right_inner">
                            <p class="footer_link_title">Opening Hours</p>
                            <div class="footer_link_div">
                                <button class="btn footer_link">Tue-Fri: Lunch & Dinner</button>
                                <button class="btn footer_link">Sat-Sun: Dinner Only</button>
                                <button class="btn footer_link">Monday: Closed</button>
                                <button class="btn footer_link_arrow">Reserve a Table →</button>

                            </div>
                        </div>
                    </div>
                </div>
                <div class="footer_bottom">
                    <p class="footer_copyright">© 2025 Maison Dorée. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>








    <!-- JQuery CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Bootstrap JS Links -->
    <script src="./assets/dist/bootstrap/js/bootstrap.popper.min.js"></script>
    <script src="./assets/dist/bootstrap/js/bootstrap.min.js"></script>

    <!-- Owl Carousel JS Links -->
    <script src="./assets/dist/owl-carousel/js/owl.carousel.js"></script>


    <script>
        $(document).ready(function () {
            $(".hamburger_menu").click(function () {
                $(".nav_mobo").fadeIn("slow");
                $(".hamburger_menu").fadeOut("slow");
                $(".hamburger_menu_close").fadeIn("slow");
            });
            $(".hamburger_menu_close").click(function () {
                $(".nav_mobo").fadeOut("slow");
                $(".hamburger_menu").fadeIn("slow");
                $(".hamburger_menu_close").fadeOut("slow");
            });
        });
    </script>

</body>

</html>
