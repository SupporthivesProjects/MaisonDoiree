    <script>
        $(document).ready(function () {
            $(".hamburger_menu").click(function () {
                $(".nav_mobo").fadeIn("slow");
                $(".hamburger_menu").fadeOut("slow");
                $(".hamburger_menu_close").fadeIn("slow");
            });
            $(".hamburger_menu_close").click(function () {
                $(".nav_mobo").fadeOut("slow");
                $(".hamburger_menu").fadeIn("slow");
                $(".hamburger_menu_close").fadeOut("slow");
            });
        });
    </script>
    <!-- TAB Pannel -->
    <script>
        const buttons = document.querySelectorAll('.gallery_tab-nav .nav-link');
        const items = document.querySelectorAll('.gallery_tab-item');

        buttons.forEach(btn => {
            btn.addEventListener('click', function () {

                // Remove active from ALL buttons safely
                buttons.forEach(b => b.classList.remove('active'));

                // Add active to clicked
                this.classList.add('active');

                const filter = this.getAttribute('data-filter');

                items.forEach(item => {
                    if (filter === 'all' || item.classList.contains(filter)) {
                        item.classList.remove('gallery_tab-hidden');
                    } else {
                        item.classList.add('gallery_tab-hidden');
                    }
                });

            });
        });
    </script>
